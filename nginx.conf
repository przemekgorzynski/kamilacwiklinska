server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml application/json;
    gzip_min_length 1024;

    # Hero background images
    location /back/ {
        autoindex on;
        autoindex_format json;
        add_header Cache-Control "no-cache";
    }

    # Gallery directory listing — returns JSON so the browser can discover folders/images
    location /images/gallery/ {
        autoindex on;
        autoindex_format json;
        add_header Access-Control-Allow-Origin *;
        add_header Cache-Control "no-cache";
    }

    # Cache actual image files aggressively
    location ~* /images/gallery/.+\.(jpg|jpeg|png|webp|gif|avif)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Cache other static assets
    location ~* \.(js|css|svg|ico|woff2?)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
