apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kamilacwiklinska
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/przemekgorzynski/kamilacwiklinska.git
    targetRevision: HEAD
    path: k8s
  destination:
    server: https://kubernetes.default.svc
    namespace: kamilacwiklinska
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
