services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: kamilacwiklinska:local
    container_name: kamilacwiklinska
    ports:
      - "80:80"
    restart: unless-stopped
    # The gallery photos are baked into the image. To serve photos from the
    # host instead (as in production), uncomment and point at your folder:
    # volumes:
    #   - ./gallery:/usr/share/nginx/html/images/gallery:ro
